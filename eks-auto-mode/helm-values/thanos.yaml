global:
  objstore:
    createSecret: true
    config: |
      type: S3
      config:
        endpoint: s3.ap-northeast-2.amazonaws.com
        bucket: ${thanos_bucket}
        region: ap-northeast-2
        aws_sdk_auth: false
query:
  enabled: true
  stores:
    - dnssrv+_grpc._tcp.kube-prometheus-thanos-discovery.monitoring.svc.cluster.local
  ingress:
    enabled: true
    ingressClassName: alb
    hosts: 
      - host: ${query_hostname}
        paths:
          - path: /
            pathType: Prefix
queryFrontend:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: alb
    hosts: 
      - host: ${queryfrontend_hostname}
        paths:
          - path: /
            pathType: Prefix
storegateway:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: alb
    hosts: 
      - host: ${storegateway_hostname}
        paths:
          - path: /
            pathType: Prefix
receive:
  enabled: false
compactor:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: alb
    hosts: 
      - host: ${compactor_hostname}
        paths:
          - path: /
            pathType: Prefix
  retentionResolutionRaw: 30d
  retentionResolution5m: 120d
  retentionResolution1h: 10y